name: Deploy
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Ensure index.html exists
        # 确保 build/client 目录下有 index.html 入口文件
        run: |
          ls -R build/client
          if [ ! -f build/client/index.html ]; then
            cp build/client/*.html build/client/index.html || echo "No html found"
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/client
          publish_branch: gh-pages